<body>
    <h1>letra marcada</h1>
    <h2>negrito/negócio mais marcado</h2>
    <p>aqui <b>não</b> tem semântica </p>
    <p>aqui <strong>tem</strong> semântica</p>
    <p>e aqui temos <i>itálico</i> <b>sem</b> semântica</p>
    <p>e aqui eu tenho <em>itálico</em> <b>com</b> semântica</p>
    </body>
